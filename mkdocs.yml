site_name: 🐾 Adoptame — Refugio de Mascotas
site_description: Conectamos mascotas rescatadas con hogares llenos de amor.
site_author: Adoptame Refugio

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: pink
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.tabs.link
    - content.code.copy
  font:
    text: Nunito
    code: Roboto Mono
  icon:
    logo: material/paw
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/pastel.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - 🏠 Inicio: index.md
  - 🐾 Mascotas en Adopción: mascotas.md
  - 📋 Proceso de Adopción: proceso.md
